[build]
  command = "npm run build"
  publish = "dist/public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"
  included_files = ["shared/**"]

# SPA fallback — only for non-API routes
# API routes are handled by function config.path declarations
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
